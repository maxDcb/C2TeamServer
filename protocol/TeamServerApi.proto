syntax = "proto3";

package teamserverapi;


service TeamServerApi
{
  rpc Authenticate(AuthRequest) returns (AuthResponse) {}

  rpc ListListeners(Empty) returns (stream Listener) {}
  rpc AddListener(Listener) returns (OperationAck) {}
  rpc StopListener(ListenerSelector) returns (OperationAck) {}

  rpc ListSessions(Empty) returns (stream Session) {}
  rpc StopSession(SessionSelector) returns (OperationAck) {}

  rpc ListArtifacts(ArtifactQuery) returns (stream ArtifactSummary) {}

  rpc GetCommandHelp(CommandHelpRequest) returns (CommandHelpResponse) {}
  rpc SendSessionCommand(SessionCommandRequest) returns (CommandAck) {}
  rpc StreamSessionCommandResults(SessionSelector) returns (stream CommandResult) {}

  rpc ExecuteTerminalCommand(TerminalCommandRequest) returns (TerminalCommandResponse) {}
}


enum Status
{
  OK = 0;
  KO = 1;
}


message Empty
{
}


message OperationAck
{
  Status status = 1;
  string message = 2;
}


message AuthRequest
{
  string username = 1;
  string password = 2;
}


message AuthResponse
{
  Status status = 1;
  string token = 2;
  string message = 3;
}


message ListenerSelector
{
  string listener_hash = 1;
}


message SessionSelector
{
  string beacon_hash = 1;
  string listener_hash = 2;
}


message Listener
{
  string listener_hash = 1;
  string type = 2;
  int32 port = 3;
  string ip = 4;
  int32 session_count = 5;
  string project = 6;
  string token = 7;
  string domain = 8;
  string beacon_hash = 9;
}


message Session
{
  string beacon_hash = 1;
  string listener_hash = 2;
  string hostname = 3;
  string username = 4;
  string arch = 5;
  string privilege = 6;
  string os = 7;
  string last_proof_of_life = 8;
  bool killed = 9;
  string internal_ips = 10;
  string process_id = 11;
  string additional_information = 12;
}


message ArtifactQuery
{
  string category = 1;
  string scope = 2;
  string platform = 3;
  string arch = 4;
  string name_contains = 5;
}


message ArtifactSummary
{
  string artifact_id = 1;
  string name = 2;
  string display_name = 3;
  string category = 4;
  string scope = 5;
  string platform = 6;
  string arch = 7;
  string format = 8;
  string source = 9;
  int64 size = 10;
  string sha256 = 11;
  string description = 12;
  repeated string tags = 13;
}


message CommandHelpRequest
{
  SessionSelector session = 1;
  string command = 2;
}


message CommandHelpResponse
{
  Status status = 1;
  string command = 2;
  string help = 3;
  string message = 4;
}


message SessionCommandRequest
{
  SessionSelector session = 1;
  string command = 2;
  string command_id = 3;
}


message CommandAck
{
  Status status = 1;
  string command_id = 2;
  string message = 3;
}


message CommandResult
{
  Status status = 1;
  SessionSelector session = 2;
  string command_id = 3;
  // Prepared beacon/module instruction that produced the result.
  string instruction = 4;
  // Original operator command line.
  string command = 5;
  bytes output = 6;
  string message = 7;
}


message TerminalCommandRequest
{
  string command = 1;
  bytes data = 2;
}


message TerminalCommandResponse
{
  Status status = 1;
  string command = 2;
  string result = 3;
  bytes data = 4;
  string message = 5;
}
