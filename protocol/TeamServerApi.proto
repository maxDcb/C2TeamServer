syntax = "proto3";

package teamserverapi;


// Interface exported by the server.
service TeamServerApi
{
  rpc Authenticate(AuthRequest) returns (AuthResponse) {}
  rpc GetListeners(Empty) returns (stream Listener) {}
  rpc AddListener(Listener) returns (Response) {}
  rpc StopListener(Listener) returns (Response) {}

  rpc GetSessions(Empty) returns (stream Session) {}
  rpc StopSession(Session) returns (Response) {}

  rpc GetHelp(Command) returns (CommandResponse) {}
  rpc SendCmdToSession(Command) returns (CommandAck) {}
  rpc GetResponseFromSession(Session) returns (stream CommandResponse) {}

  rpc SendTermCmd(TermCommand) returns (TermCommand) {}
}


message Empty
{
}


message AuthRequest
{
  string username = 1;
  string password = 2;
}


message AuthResponse
{
  Status status = 1;
  string token = 2;
  string message = 3;
}


enum Status
{
  OK = 0;
  KO = 1;
}


message Response
{
  Status status = 1;
  bytes message = 2;
}


message Listener
{
  string listenerHash = 1;
  string type = 2;
  int32 port = 3;
  string ip = 4;
  string project = 6;
  string token = 7;
  string domain = 8;
  int32 numberOfSession = 5;
  string beaconHash = 9;
}


message Session
{
  string beaconHash = 1;
  string listenerHash = 2;
  string hostname = 3;
  string username = 4;
  string arch = 5;
  string privilege = 6;
  string os = 7;
  string lastProofOfLife = 8;
  bool killed = 9;
  string internalIps = 10;
  string processId = 11;
  string additionalInformation = 12;
}


message Command
{
  string beaconHash = 1;
  string listenerHash = 2;
  // Original operator command line.
  string cmd = 3;
  // Client-side correlation id echoed by CommandAck and CommandResponse.
  string commandId = 4;
}


message CommandAck
{
  Status status = 1;
  string commandId = 2;
  bytes message = 3;
}


message CommandResponse
{
  string beaconHash = 1;
  string listenerHash = 2;
  string commandId = 3;
  // Prepared beacon/module instruction that produced the response.
  string instruction = 4;
  // Original operator command line.
  string cmd = 5;
  bytes response = 6;
}


message TermCommand
{
  string cmd = 1;
  string result = 2;
  bytes data = 3;
}
