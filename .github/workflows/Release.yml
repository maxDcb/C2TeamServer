name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'


env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

permissions:
  contents: write

jobs:      
  buildAndRelease:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq libsmbclient-dev unzip

    - uses: ConorMacBride/install-package@v1
      with:
        apt: golang-cfssl

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Conan
      run: python -m pip install --upgrade pip "conan==2.24.0"

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DWITH_TESTS=OFF
        -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{github.workspace}}/conan_provider.cmake
        -DCONAN_HOST_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_BUILD_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_LOCKFILE=${{github.workspace}}/conan.lock

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 18

    - name: Stage release bundle
      run: |
        cmake --build ${{github.workspace}}/build --target stage_release_bundle

    - name: Verify staged client protocol bundle
      run: |
        python - <<'PY'
        import pathlib
        import sys

        bundle_root = pathlib.Path("${{github.workspace}}/build/release-staging/Release/Client").resolve()
        sys.path.insert(0, str(bundle_root))
        import c2client_protocol.TeamServerApi_pb2  # noqa: F401
        print(bundle_root)
        PY

    - name: Import implant releases
      run: |
        set -euo pipefail

        stage_root="${{github.workspace}}/build/release-staging/Release"
        import_root="${{github.workspace}}/build/release-imports"
        rm -rf "${import_root}"
        mkdir -p "${import_root}/windows" "${import_root}/linux"

        windows_url="$(wget -q -O - 'https://api.github.com/repos/maxDcb/C2Implant/releases/latest' | jq -r '.assets[] | select(.name=="Release.zip").browser_download_url')"
        linux_url="$(wget -q -O - 'https://api.github.com/repos/maxDcb/C2LinuxImplant/releases/latest' | jq -r '.assets[] | select(.name=="Release.tar.gz").browser_download_url')"

        wget -q "${windows_url}" -O "${import_root}/C2Implant.zip"
        unzip -oq "${import_root}/C2Implant.zip" -d "${import_root}/windows"

        wget -q "${linux_url}" -O "${import_root}/C2LinuxImplant.tar.gz"
        tar -xzf "${import_root}/C2LinuxImplant.tar.gz" -C "${import_root}/linux"

        if [ -d "${import_root}/windows/Release/Beacons" ]; then
          rm -rf "${stage_root}/WindowsBeacons"
          cp -R "${import_root}/windows/Release/Beacons" "${stage_root}/WindowsBeacons"
        elif [ -d "${import_root}/windows/Release/WindowsBeacons" ]; then
          rm -rf "${stage_root}/WindowsBeacons"
          cp -R "${import_root}/windows/Release/WindowsBeacons" "${stage_root}/WindowsBeacons"
        fi

        if [ -d "${import_root}/windows/Release/Modules" ]; then
          rm -rf "${stage_root}/WindowsModules"
          cp -R "${import_root}/windows/Release/Modules" "${stage_root}/WindowsModules"
        elif [ -d "${import_root}/windows/Release/WindowsModules" ]; then
          rm -rf "${stage_root}/WindowsModules"
          cp -R "${import_root}/windows/Release/WindowsModules" "${stage_root}/WindowsModules"
        fi

        if [ -d "${import_root}/linux/Release/Beacons" ]; then
          rm -rf "${stage_root}/LinuxBeacons"
          cp -R "${import_root}/linux/Release/Beacons" "${stage_root}/LinuxBeacons"
        elif [ -d "${import_root}/linux/Release/LinuxBeacons" ]; then
          rm -rf "${stage_root}/LinuxBeacons"
          cp -R "${import_root}/linux/Release/LinuxBeacons" "${stage_root}/LinuxBeacons"
        fi

        if [ -d "${import_root}/linux/Release/Modules" ]; then
          rm -rf "${stage_root}/LinuxModules"
          cp -R "${import_root}/linux/Release/Modules" "${stage_root}/LinuxModules"
        elif [ -d "${import_root}/linux/Release/LinuxModules" ]; then
          rm -rf "${stage_root}/LinuxModules"
          cp -R "${import_root}/linux/Release/LinuxModules" "${stage_root}/LinuxModules"
        fi

        tar -zcf "${{github.workspace}}/Release.tar.gz" -C "${{github.workspace}}/build/release-staging" Release

    - name: Upload release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{github.workspace}}/Release.tar.gz
        asset_name: Release.tar.gz
        tag: ${{ github.ref }}
        overwrite: true
        body: "C2TeamServer client and server, include the release of C2Implant with the windows beacons and modules" 
