name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:      
  buildAndTest:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install Samba client dev headers
      run: |
        sudo apt-get update
        sudo apt-get install -y libsmbclient-dev

    # Needed to generate certificates
    - uses: ConorMacBride/install-package@v1
      with:
        apt: golang-cfssl
    
    - name: Install Conan
      run: python -m pip install --upgrade pip "conan==2.24.0"

    - name: Configure CMake for tests
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{github.workspace}}/conan_provider.cmake
        -DCONAN_HOST_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_BUILD_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_LOCKFILE=${{github.workspace}}/conan.lock

    - name: Build for test
      run: cmake --build ${{github.workspace}}/build -j 18

    - name: Run unit tests
      run: ctest --test-dir build --output-on-failure

    - name: Install client test dependencies
      run: |
        python -m pip install -e "${{github.workspace}}/C2Client[test]"

    - name: Run client tests
      env:
        C2_PROTOCOL_PYTHON_ROOT: ${{github.workspace}}/build/generated/python_protocol
        QT_QPA_PLATFORM: offscreen
      run: python -m pytest "${{github.workspace}}/C2Client/tests" -q

    - name: Stage release bundle smoke test
      run: |
        cmake --build ${{github.workspace}}/build --target stage_release_bundle
        test -x "${{github.workspace}}/build/release-staging/Release/TeamServer/TeamServer"
        test -f "${{github.workspace}}/build/release-staging/Release/Client/c2client_protocol/TeamServerApi_pb2.py"

    - name: Prepare integration runtime smoke test
      run: |
        cmake --build ${{github.workspace}}/build --target stage_integration_runtime
        test -x "${{github.workspace}}/build/integration-staging/runtime/Release/TeamServer/TeamServer"
        test -f "${{github.workspace}}/build/integration-staging/runtime/Release/Client/c2client_protocol/TeamServerApi_pb2.py"

    - name: Configure CMake like the release
      run: >
        cmake -B ${{github.workspace}}/buildRelease
        -DWITH_TESTS=OFF
        -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=${{github.workspace}}/conan_provider.cmake
        -DCONAN_HOST_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_BUILD_PROFILE=${{github.workspace}}/conan/profiles/linux-gcc13
        -DCONAN_LOCKFILE=${{github.workspace}}/conan.lock

    - name: Build like the release
      run: cmake --build ${{github.workspace}}/buildRelease -j 18
